# Framing material properties
# Source: RSI-calc.xlsx, NRCan Table A-9.36.2.4.(1)

wood:
  rsi_per_mm: 0.0085    # thermal resistivity of softwood lumber

  studs:
    "2x4":   { depth_mm: 89 }
    "2x6":   { depth_mm: 140 }
    "2x8":   { depth_mm: 184 }
    "2x10":  { depth_mm: 235 }
    "2x12":  { depth_mm: 286 }

  # Cavity area percentage (= 100 - framing_fraction)
  # Source: NRCan Table A-9.36.2.4.(1)-A
  cavity_pct:
    16:   77      # 16" OC → 23% framing
    19:   78.5    # 19.2" OC → 21.5% framing
    24:   80      # 24" OC → 20% framing

steel:
  rsi_per_mm: 0.0000161  # thermal resistivity of steel

  studs:
    "2x3-5/8": { depth_mm: 92.075 }
    "2x6":     { depth_mm: 152 }

  # NBC 2020 Table A-9.36.2.4.(1)-B — K1/K2 weighting factors
  # K1 weights RSI_T1 (full-assembly parallel-path), K2 weights RSI_T3 (stud-cavity pp + boundary series)
  # "insulating_sheathing" = continuous exterior insulation is present
  k_values:
    under_500_no_ins:   { k1: 0.33, k2: 0.67 }   # < 500 mm without insulating sheathing
    under_500_with_ins: { k1: 0.40, k2: 0.60 }   # < 500 mm with insulating sheathing
    over_500:           { k1: 0.50, k2: 0.50 }   # ≥ 500 mm (any)

  # NBC 2020 Table A-9.36.2.4.(1)-C — Steel framing/cavity percentages (above-grade walls)
  # These are NOT computed from web thickness — they come from the NBC table
  # and are based on common framing practices (18-gauge / 1.2 mm steel)
  cavity_pct:
    under_500: { framing: 0.77, cavity: 99.23 }   # < 500 mm o.c.
    over_500:  { framing: 0.67, cavity: 99.33 }   # ≥ 500 mm o.c.

  # Spacing breakpoint (mm) — 16" = 406mm, 19.2" = 488mm (both < 500); 24" = 610mm (≥ 500)
  spacing_breakpoint_mm: 500
